    <style>
      * { box-sizing: border-box; }
      html { scroll-behavior: smooth; }
      body { background: #0e0e0e; color: #ffffff; font-family: 'Manrope', 'Inter', sans-serif; }
      ::selection { background: rgba(163, 166, 255, 0.25); }

      .glass-panel { background: rgba(38,38,38,0.6); backdrop-filter: blur(20px); }
      .ghost-border { outline: 1px solid rgba(73,72,71,0.15); }
      .glow-indigo { box-shadow: 0 0 40px 0 rgba(163,166,255,0.08); }
      .text-gradient {
        background: linear-gradient(to right, #bff365, #ffb148);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .noise-bg {
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        opacity: 0.02;
        pointer-events: none;
        position: fixed;
        inset: 0;
        z-index: 1;
      }
      .custom-scrollbar::-webkit-scrollbar { width: 4px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(163,166,255,0.2); border-radius: 2px; }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(163,166,255,0.4); }
